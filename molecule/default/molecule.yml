---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: debian-bookworm
    image: debian:bookworm-slim
    pre_build_image: false
    command: sleep infinity
  - name: ubuntu-jammy
    image: ubuntu:jammy
    pre_build_image: false
    command: sleep infinity
  - name: ubuntu-noble
    image: ubuntu:noble
    pre_build_image: false
    command: sleep infinity

provisioner:
  name: ansible
  inventory:
    host_vars:
      debian-bookworm:
        ansible_python_interpreter: /usr/bin/python3
      ubuntu-jammy:
        ansible_python_interpreter: /usr/bin/python3
      ubuntu-noble:
        ansible_python_interpreter: /usr/bin/python3
      redhat-ubi9:
        ansible_python_interpreter: /usr/bin/python3
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml

scenario:
  name: default
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
