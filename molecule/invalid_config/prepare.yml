---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Install openssh-server
      ansible.builtin.apt:
        name: openssh-server
        update_cache: true
        state: present

    - name: Create /run/sshd directory
      ansible.builtin.file:
        path: /run/sshd
        state: directory
        mode: '0755'

    - name: Record original sshd_config checksum
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config
      register: original_sshd_config

    - name: Store original checksum as fact
      ansible.builtin.set_fact:
        original_sshd_checksum: "{{ original_sshd_config.stat.checksum }}"
