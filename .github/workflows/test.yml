---
name: Molecule Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  molecule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install molecule molecule-plugins[docker] ansible-core
          ansible-galaxy collection install community.docker ansible.posix

      - name: Run Molecule tests (default)
        run: molecule test

      - name: Run Molecule tests (invalid_config)
        run: molecule test -s invalid_config
